workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Set iOS deployment target
        script: |
          find . -name "Podfile" -exec sed -i '' "s/^# platform :ios, '.*'/platform :ios, '13.0'/" {} \;
          find . -name "Podfile" -exec sed -i '' "s/^platform :ios, '.*'/platform :ios, '13.0'/" {} \;
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build iOS app
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa